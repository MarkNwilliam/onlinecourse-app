<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'onlinecourse_app:index' %}">Home</a></li>
                <li class="breadcrumb-item active" aria-current="page">{{ course.name }}</li>
            </ol>
        </nav>
        <div class="card mb-4">
            <div class="card-body">
                <h1 class="card-title">{{ course.name }}</h1>
                <p class="card-text">{{ course.description }}</p>
                <p class="text-muted">Published: {{ course.pub_date }}</p>
            </div>
        </div>
        <h2>Lessons</h2>
        <div class="row">
            {% for lesson in lessons %}
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ lesson.title }}</h5>
                        <p class="card-text">{{ lesson.content|truncatewords:30 }}</p>
                        <a href="{% url 'onlinecourse_app:lesson_details' lesson.id %}" class="btn btn-primary">View Lesson</a>
                    </div>
                </div>
            </div>
            {% empty %}
            <p>No lessons available yet.</p>
            {% endfor %}
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
